name: Mirror main to portfolio-prod

on:
  push:
    branches: [master]

jobs:
  mirror:
    if: github.repository == 'imrd-works/portfolio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to portfolio-prod
        run: |
          git push --force \
            https://${{ secrets.PROD_PUSH_TOKEN }}@github.com/imrd-works/portfolio-prod.git \
            HEAD:master
